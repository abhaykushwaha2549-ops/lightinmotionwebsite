<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard – LightInMotion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#0071E3;--purple:#7B61FF;--cyan:#00FFD1;--bg:#050507;
  --surface:rgba(25,25,28,0.6);--surface-border:rgba(255,255,255,0.08);
  --text-main:#F5F5F7;--text-muted:#A1A1A6;
  --green:#22c55e;--red:#ef4444;--orange:#f59e0b;
}
body{background:var(--bg);color:var(--text-main);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;}
h1,h2,h3{font-family:'Outfit',sans-serif;font-weight:600;}

/* Login */
#login-screen{background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--surface-border);border-radius:24px;padding:40px;width:100%;max-width:400px;text-align:center;margin:auto;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.5);}
#login-screen h1{margin-bottom:24px;font-size:28px;}
.input-group{margin-bottom:20px;text-align:left;}
.input-group label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:8px;font-weight:500;letter-spacing:.03em;text-transform:uppercase;}
input[type=text],input[type=password],input[type=number],textarea,select{
  width:100%;padding:12px 16px;background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;
  color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none;
  transition:border-color .25s;
}
input:focus,textarea:focus,select:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
select option{background:#1a1a1e;color:#fff;}
.btn{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:transform .2s,opacity .2s;margin-top:10px;}
.btn:hover{transform:translateY(-2px);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-cyan{background:linear-gradient(135deg,#00e5c8,#0071E3);color:#fff;}
.btn-red{background:var(--red);color:#fff;width:auto;padding:8px 16px;margin:0;font-size:13px;border-radius:8px;}

/* Dashboard */
#dashboard{display:none;width:100%;max-width:1080px;margin:0 auto;}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--surface-border);}
.dash-header h1{font-size:30px;}
.tabs{display:flex;gap:8px;margin-bottom:28px;background:rgba(255,255,255,0.04);padding:5px;border-radius:14px;width:fit-content;}
.tab{padding:9px 22px;border:none;border-radius:10px;background:transparent;color:var(--text-muted);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.tab.active{background:rgba(255,255,255,0.1);color:#fff;font-weight:600;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;}
.card{background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--surface-border);border-radius:24px;padding:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);}
.card h2{margin-bottom:22px;font-size:18px;color:#fff;}
.card-section{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid rgba(255,255,255,0.05);}
.card-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.card-section h3{font-size:14px;margin-bottom:14px;color:var(--cyan);letter-spacing:.03em;text-transform:uppercase;}

/* ── Upload Card ── */
.upload-card{background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--surface-border);border-radius:24px;padding:32px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);}
.upload-card h2{margin-bottom:28px;font-size:20px;display:flex;align-items:center;gap:10px;}
.upload-card h2 svg{color:var(--cyan);}
.fields-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:700px){.fields-row{grid-template-columns:1fr;}}

/* Drag-drop zone */
.drop-zone{
  border:2px dashed rgba(0,255,209,0.3);border-radius:16px;
  padding:40px 20px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
  background:rgba(0,255,209,0.02);margin-bottom:20px;position:relative;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--cyan);background:rgba(0,255,209,0.05);}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:40px;margin-bottom:12px;display:block;}
.drop-zone p{color:var(--text-muted);font-size:14px;line-height:1.6;}
.drop-zone p strong{color:var(--cyan);cursor:pointer;}
.drop-zone .file-name{color:#fff;font-weight:600;font-size:15px;margin-top:8px;}
.drop-zone .file-size{color:var(--text-muted);font-size:12px;}

/* Progress */
.progress-wrap{display:none;margin-bottom:20px;}
.progress-bar-bg{height:6px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#00e5c8,#0071E3);border-radius:99px;transition:width .1s;}
.progress-text{font-size:13px;color:var(--text-muted);margin-top:8px;text-align:right;}

/* Upload status */
.upload-msg{display:none;padding:14px 18px;border-radius:12px;font-size:14px;margin-bottom:16px;font-weight:500;}
.upload-msg.success{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:var(--green);}
.upload-msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);}

/* Files table */
.files-table{width:100%;border-collapse:collapse;margin-top:20px;}
.files-table th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06);}
.files-table td{padding:12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
.files-table tr:last-child td{border-bottom:none;}
.file-badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.badge-apk{background:rgba(34,197,94,0.15);color:var(--green);}
.badge-exe{background:rgba(0,113,227,0.15);color:#60a5fa;}
.badge-zip{background:rgba(245,158,11,0.15);color:var(--orange);}
.copy-btn{background:rgba(255,255,255,0.07);border:none;border-radius:7px;color:var(--text-muted);padding:5px 10px;font-size:12px;cursor:pointer;transition:background .2s;}
.copy-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
.empty-files{text-align:center;padding:40px;color:var(--text-muted);font-size:14px;}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,12,0.9);backdrop-filter:blur(20px);border-top:1px solid var(--surface-border);padding:18px;text-align:center;z-index:100;transform:translateY(100%);transition:transform .3s;}
.save-bar.visible{transform:translateY(0);}
#msg{margin-top:0;font-size:14px;color:var(--cyan);display:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>Admin Access</h1>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" onkeypress="if(event.key==='Enter') login()">
  </div>
  <button class="btn" onclick="login()">Login</button>
  <div id="login-err" style="color:#ff4444;margin-top:16px;font-size:14px;display:none;">Incorrect password</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <h1>Dashboard</h1>
    <button class="btn" style="width:auto;padding:10px 24px;" onclick="location.reload()">Logout</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('downloads')">⬇️ Downloads</button>
    <button class="tab" onclick="switchTab('upload')">📤 Upload Files</button>
    <button class="tab" onclick="switchTab('pricing')">💰 Pricing</button>
  </div>

  <!-- TAB: DOWNLOADS -->
  <div id="tab-downloads" class="tab-content active">
    <div class="dash-grid">
      <div class="card">
        <h2>Download Links</h2>

        <div class="card-section">
          <h3>📱 Android App</h3>
          <div class="input-group">
            <label>Version (e.g., v2.5.0)</label>
            <input type="text" id="v-android" oninput="showSaveBar()">
          </div>
          <div class="input-group" style="margin-bottom:0;">
            <label>Download URL</label>
            <input type="text" id="u-android" oninput="showSaveBar()">
          </div>
        </div>

        <div class="card-section">
          <h3>📺 Android TV</h3>
          <div class="input-group">
            <label>Version</label>
            <input type="text" id="v-tv" oninput="showSaveBar()">
          </div>
          <div class="input-group" style="margin-bottom:0;">
            <label>Download URL</label>
            <input type="text" id="u-tv" oninput="showSaveBar()">
          </div>
        </div>

        <div class="card-section">
          <h3>💻 Windows Client</h3>
          <div class="input-group">
            <label>Version</label>
            <input type="text" id="v-windows" oninput="showSaveBar()">
          </div>
          <div class="input-group" style="margin-bottom:0;">
            <label>Download URL</label>
            <input type="text" id="u-windows" oninput="showSaveBar()">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB: UPLOAD FILES -->
  <div id="tab-upload" class="tab-content">
    <div class="upload-card">
      <h2>
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Publish New Release
      </h2>

      <!-- Fields row -->
      <div class="input-group" style="margin-bottom:20px;">
        <label style="color:var(--orange);">GitHub Personal Access Token (Required for Vercel)</label>
        <input type="password" id="gh-token" placeholder="Paste ghp_... (Stored locally on your device)" oninput="localStorage.setItem('lim_github_token', this.value)">
      </div>

      <div class="fields-row">
        <div class="input-group" style="margin-bottom:0;">
          <label>Target Platform</label>
          <select id="up-platform">
            <option value="android">Android App (.apk)</option>
            <option value="tv">Android TV (.apk)</option>
            <option value="windows">Windows Client (.exe)</option>
            <option value="">Other (no auto-link)</option>
          </select>
        </div>
        <div class="input-group" style="margin-bottom:0;">
          <label>Version String</label>
          <input type="text" id="up-version" placeholder="e.g. v2.1.0">
        </div>
        <div class="input-group" style="margin-bottom:0;">
          <label>Release Notes (optional)</label>
          <input type="text" id="up-notes" placeholder="Brief description…">
        </div>
      </div>

      <!-- Drop zone -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".apk,.exe,.zip,.msi" onchange="onFileSelected(this.files[0])">
        <span class="drop-icon">📂</span>
        <p>Drop your file here or <strong>browse</strong></p>
        <p style="margin-top:4px;font-size:12px;">.apk, .exe, .zip supported &nbsp;·&nbsp; max 200 MB</p>
        <div id="selected-file" style="display:none;margin-top:12px;">
          <div class="file-name" id="sel-name"></div>
          <div class="file-size" id="sel-size"></div>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="progress-text" id="prog-text">0%</div>
      </div>

      <!-- Status message -->
      <div class="upload-msg" id="upload-msg"></div>

      <!-- Upload button -->
      <button class="btn btn-cyan" id="upload-btn" onclick="doUpload()" disabled>
        Upload &amp; Publish
      </button>

      <!-- ── Uploaded Files List ── -->
      <div style="margin-top:40px;padding-top:32px;border-top:1px solid rgba(255,255,255,0.06);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 style="margin:0;font-size:18px;">Uploaded Files</h2>
          <button class="copy-btn" onclick="loadFiles()" style="font-size:13px;padding:7px 14px;">↻ Refresh</button>
        </div>
        <div id="files-list"><div class="empty-files">Loading…</div></div>
      </div>
    </div>
  </div>

  <!-- TAB: PRICING -->
  <div id="tab-pricing" class="tab-content">
    <div class="dash-grid">
      <div class="card">
        <h2>App Pricing (₹)</h2>
        <div class="input-group" style="margin-bottom:0;">
          <label>Universal App Price</label>
          <input type="number" id="p-app" oninput="showSaveBar()">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SAVE BAR (for text data) -->
<div class="save-bar" id="save-bar">
  <div style="max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
    <span style="color:var(--text-muted);font-size:14px;">Unsaved changes</span>
    <div style="display:flex;gap:16px;align-items:center;">
      <span id="msg">Saved successfully!</span>
      <button class="btn" style="width:auto;padding:12px 32px;margin:0;" onclick="saveData()">Publish Changes</button>
    </div>
  </div>
</div>

<script>
let currentData = {};
let sessionPass = '';
let selectedFile = null;

// ── Login ──
function login() {
  const pass = document.getElementById('password').value;
  if (!pass) return;
  document.getElementById('login-err').style.display = 'none';
  fetch('/api/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pass })
  })
  .then(r => {
    if (!r.ok) throw new Error('Unauthorized');
    return fetch('/api/data');
  })
  .then(r => r.json())
  .then(data => {
    currentData = data;
    sessionPass = pass;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('gh-token').value = localStorage.getItem('lim_github_token') || '';
    populateForms(data);
    loadFiles();
  })
  .catch(() => {
    document.getElementById('login-err').style.display = 'block';
  });
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── Populate forms ──
function populateForms(data) {
  if (data.pricing) {
    const pa = document.getElementById('p-app');
    if (pa) pa.value = data.pricing.app || '';
  }
  if (data.downloads) {
    const d = data.downloads;
    document.getElementById('v-android').value = d.android?.version || '';
    document.getElementById('u-android').value = d.android?.url || '';
    document.getElementById('v-tv').value = d.tv?.version || '';
    document.getElementById('u-tv').value = d.tv?.url || '';
    document.getElementById('v-windows').value = d.windows?.version || '';
    document.getElementById('u-windows').value = d.windows?.url || '';
  }
}

function showSaveBar() {
  document.getElementById('save-bar').classList.add('visible');
  document.getElementById('msg').style.display = 'none';
}

// ── Save text data ──
function saveData() {
  const newData = {
    pricing: { app: document.getElementById('p-app').value },
    downloads: {
      android: { version: document.getElementById('v-android').value, url: document.getElementById('u-android').value },
      tv:      { version: document.getElementById('v-tv').value,      url: document.getElementById('u-tv').value },
      windows: { version: document.getElementById('v-windows').value, url: document.getElementById('u-windows').value }
    }
  };
  fetch('/api/data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: sessionPass, data: newData })
  })
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(() => {
    document.getElementById('save-bar').classList.remove('visible');
    const msg = document.getElementById('msg');
    msg.style.display = 'inline-block';
    setTimeout(() => msg.style.display = 'none', 3000);
  })
  .catch(err => alert('Error saving: ' + err.message));
}

// ── Drag-drop ──
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) onFileSelected(f);
});

function onFileSelected(file) {
  if (!file) return;
  const allowed = ['.apk', '.exe', '.zip', '.msi'];
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!allowed.includes(ext)) { showUploadMsg('Only .apk, .exe, .zip, .msi files are supported.', 'error'); return; }
  selectedFile = file;
  document.getElementById('sel-name').textContent = file.name;
  document.getElementById('sel-size').textContent = formatBytes(file.size);
  document.getElementById('selected-file').style.display = 'block';
  document.getElementById('upload-btn').disabled = false;
  hideUploadMsg();
}

// ── Upload ──
function doUpload() {
  if (!selectedFile) return;
  const ghToken = (document.getElementById('gh-token').value || '').trim();
  if (!ghToken) {
    showUploadMsg('❌ Error: GitHub Personal Access Token is required to upload files on Vercel.', 'error');
    return;
  }

  const platform = document.getElementById('up-platform').value;
  const version  = document.getElementById('up-version').value.trim();
  const notes    = document.getElementById('up-notes').value.trim();
  const repo = 'abhaykushwaha2549-ops/lightinmotionwebsite';
  const tag = version ? `v${version.replace(/^v/i, '')}` : 'v1.0.0';

  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('upload-btn').disabled = true;
  hideUploadMsg();

  // 1. Get or create release
  showUploadMsg('🔍 Finding or creating GitHub Release...', 'info');

  const headers = {
    'Authorization': `token ${ghToken}`,
    'Accept': 'application/vnd.github.v3+json'
  };

  fetch(`https://api.github.com/repos/${repo}/releases/tags/${tag}`, { headers })
    .then(res => {
      if (res.status === 404) {
        // Create release
        return fetch(`https://api.github.com/repos/${repo}/releases`, {
          method: 'POST',
          headers: { ...headers, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tag_name: tag,
            name: tag,
            body: notes || `Automated upload of assets for version ${tag}`
          })
        }).then(r => {
          if (!r.ok) throw new Error('Failed to create GitHub release');
          return r.json();
        });
      }
      if (!res.ok) throw new Error('GitHub API returned error: ' + res.statusText);
      return res.json();
    })
    .then(release => {
      // 2. Delete existing asset with same name if it exists
      const existing = release.assets.find(a => a.name === selectedFile.name);
      if (existing) {
        showUploadMsg('🗑️ Deleting old asset from release...', 'info');
        return fetch(`https://api.github.com/repos/${repo}/releases/assets/${existing.id}`, {
          method: 'DELETE',
          headers
        }).then(r => {
          if (!r.ok) console.warn('Could not delete existing asset');
          return release;
        });
      }
      return release;
    })
    .then(release => {
      // 3. Upload file directly to GitHub
      showUploadMsg('📤 Uploading file directly to GitHub Releases...', 'info');
      let uploadUrl = release.upload_url.split('{')[0] + '?name=' + encodeURIComponent(selectedFile.name);

      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', uploadUrl);
        xhr.setRequestHeader('Authorization', `token ${ghToken}`);
        xhr.setRequestHeader('Content-Type', 'application/octet-stream');

        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            document.getElementById('prog-fill').style.width = pct + '%';
            document.getElementById('prog-text').textContent = pct + '%';
          }
        };

        xhr.onload = () => {
          if (xhr.status === 201 || xhr.status === 200) {
            resolve(JSON.parse(xhr.responseText));
          } else {
            reject(new Error(`GitHub upload failed: ${xhr.statusText} (${xhr.status})`));
          }
        };

        xhr.onerror = () => reject(new Error('Network error during GitHub upload.'));
        xhr.send(selectedFile);
      });
    })
    .then(assetData => {
      const downloadUrl = assetData.browser_download_url;
      if (!platform) {
        return downloadUrl;
      }

      // 4. Update data.json directly in the GitHub repository
      showUploadMsg('📝 Publishing changes to GitHub repository (data.json)...', 'info');
      return fetch(`https://api.github.com/repos/${repo}/contents/data.json`, { headers })
        .then(r => {
          if (!r.ok) throw new Error('Failed to read data.json from GitHub');
          return r.json();
        })
        .then(fileInfo => {
          const contentDecoded = decodeURIComponent(escape(atob(fileInfo.content.replace(/\s/g, ''))));
          const dataJsonObj = JSON.parse(contentDecoded);

          if (!dataJsonObj.downloads) dataJsonObj.downloads = {};
          if (!dataJsonObj.downloads[platform]) dataJsonObj.downloads[platform] = {};
          dataJsonObj.downloads[platform].version = version;
          dataJsonObj.downloads[platform].url = downloadUrl;

          const updatedBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(dataJsonObj, null, 2))));

          return fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
            method: 'PUT',
            headers: { ...headers, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: `chore: update download URL for ${platform} ${version} via admin panel`,
              content: updatedBase64,
              sha: fileInfo.sha
            })
          });
        })
        .then(r => {
          if (!r.ok) throw new Error('Failed to commit updated data.json to GitHub');
          return downloadUrl;
        });
    })
    .then(downloadUrl => {
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('upload-btn').disabled = false;
      showUploadMsg(`✅ Published successfully! Vercel will redeploy changes in 1 minute.<br>Download URL: <a href="${downloadUrl}" target="_blank" style="color:var(--cyan);text-decoration:underline;">${downloadUrl}</a>`, 'success');

      // Auto-fill download URL in Downloads tab UI
      if (platform === 'android') { document.getElementById('u-android').value = downloadUrl; if (version) document.getElementById('v-android').value = version; }
      else if (platform === 'tv') { document.getElementById('u-tv').value = downloadUrl; if (version) document.getElementById('v-tv').value = version; }
      else if (platform === 'windows') { document.getElementById('u-windows').value = downloadUrl; if (version) document.getElementById('v-windows').value = version; }

      // Reset file picker
      selectedFile = null;
      document.getElementById('selected-file').style.display = 'none';
      document.getElementById('file-input').value = '';
      document.getElementById('upload-btn').disabled = true;
    })
    .catch(err => {
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('upload-btn').disabled = false;
      showUploadMsg(`❌ Failed: ${err.message}`, 'error');
    });
}

function showUploadMsg(html, type) {
  const el = document.getElementById('upload-msg');
  el.innerHTML = html;
  el.className = 'upload-msg ' + type;
  el.style.display = 'block';
}
function hideUploadMsg() {
  document.getElementById('upload-msg').style.display = 'none';
}

// ── Files list ──
function loadFiles() {
  fetch(`/api/files?password=${encodeURIComponent(sessionPass)}`)
    .then(r => r.json())
    .then(files => renderFiles(files))
    .catch(() => { document.getElementById('files-list').innerHTML = '<div class="empty-files">Could not load files.</div>'; });
}

function renderFiles(files) {
  const el = document.getElementById('files-list');
  if (!files.length) { el.innerHTML = '<div class="empty-files">No files uploaded yet.</div>'; return; }
  const rows = files.map(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    const badgeClass = ext === 'apk' ? 'badge-apk' : ext === 'exe' ? 'badge-exe' : 'badge-zip';
    const url = `/download/${f.name}`;
    return `<tr>
      <td><span class="file-badge ${badgeClass}">${ext}</span></td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</td>
      <td style="color:var(--text-muted);">${formatBytes(f.size)}</td>
      <td style="color:var(--text-muted);font-size:12px;">${new Date(f.modified).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</td>
      <td>
        <button class="copy-btn" onclick="copyUrl('${url}')">Copy URL</button>
      </td>
      <td>
        <button class="btn-red btn" onclick="deleteFile('${f.name}', this)">Delete</button>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table class="files-table">
    <thead><tr><th>Type</th><th>Filename</th><th>Size</th><th>Date</th><th></th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function copyUrl(url) {
  const full = location.origin + url;
  navigator.clipboard.writeText(full).then(() => alert('Copied: ' + full));
}

function deleteFile(name, btn) {
  if (!confirm(`Delete "${name}"?`)) return;
  btn.disabled = true;
  fetch(`/api/files/${encodeURIComponent(name)}?password=${encodeURIComponent(sessionPass)}`, { method: 'DELETE' })
    .then(r => r.json())
    .then(res => {
      if (res.success) loadFiles();
      else alert('Delete failed: ' + res.error);
    })
    .catch(() => alert('Network error.'));
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}
